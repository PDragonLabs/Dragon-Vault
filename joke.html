<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joke Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 740px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: #333; font-size: 2.3em; }
        .header .date { color: #666; font-size: 1em; margin-top: 6px; }

        .subtitle { text-align: center; color: #666; margin-bottom: 35px; font-size: 1.05em; }

        .controls { background: #f8f9fa; padding: 25px; border-radius: 15px; margin-bottom: 30px; }
        .control-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; color: #333; margin-bottom: 8px; }
        select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1em; }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        #getJoke { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        #randomBtn { background: #17a2b8; color: white; }
        #submitBtn { background: #28a745; color: white; }
        #laughterBtn { background: #ff9800; color: white; }
        #analyticsBtn { background: #6f42c1; color: white; }

        .joke-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 35px;
            border-radius: 15px;
            min-height: 260px;
            margin-bottom: 25px;
        }
        .joke-category { font-size: 0.95em; opacity: 0.9; margin-bottom: 12px; text-transform: uppercase; }
        .joke-text { font-size: 1.4em; line-height: 1.55; margin-bottom: 18px; }
        .joke-punchline { font-size: 1.3em; font-weight: bold; margin-top: 18px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.35); }

        .rating-container { margin-top: 30px; text-align: center; }
        .rating-stars { 
            font-size: 2.6em; 
            cursor: pointer; 
            letter-spacing: 8px; 
        }
        .rating-stars span { 
            color: #ddd; 
            transition: color 0.2s; 
        }
        .rating-stars span.active, 
        .rating-stars span:hover { 
            color: #ffd700; 
        }

        .modal {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 680px;
            max-height: 92vh;
            overflow-y: auto;
        }

        .session-btn {
            background: #495057;
            color: white;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.05em;
            margin: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎭 Joke Generator</h1>
            <div class="date" id="currentDate"></div>
        </div>
        <p class="subtitle">Get jokes • Rate them • Track your humor</p>

        <div class="controls">
            <div class="control-group">
                <label for="category">🎯 Choose Category:</label>
                <select id="category">
                    <option value="Any">Any (Mixed)</option>
                    <option value="General">General</option>
                    <option value="Dad">Dad Jokes</option>
                    <option value="Programming">Programming</option>
                    <option value="Pun">Pun</option>
                    <option value="Spooky">Spooky</option>
                    <option value="Dark">Dark</option>
                    <option value="Miscellaneous">Miscellaneous</option>
                    <option value="User">User Submitted</option>
                </select>
            </div>

            <div class="button-group">
                <button id="getJoke">Get Joke</button>
                <button id="randomBtn">🎲 Random!</button>
            </div>

            <div class="button-group" style="margin-top: 15px;">
                <button id="submitBtn">📝 Submit Joke</button>
                <button id="laughterBtn">😂 Laughter Boost</button>
                <button id="analyticsBtn">📊 Analytics</button>
            </div>
        </div>

        <div class="joke-display" id="jokeDisplay">
            <div style="text-align:center; padding:70px 20px; color:rgba(255,255,255,0.85);">
                Click "Get Joke" or "Random!" to begin
            </div>
        </div>
    </div>

    <!-- Analytics Modal -->
    <div id="analyticsModal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2>📊 Analytics & Session</h2>
                <button id="closeAnalytics" style="font-size:1.8em; background:none; border:none;">×</button>
            </div>

            <div id="analyticsContent" style="padding:20px; background:#f8f9fa; border-radius:12px; margin-bottom:25px;">
                <p style="text-align:center; color:#555; line-height:1.6;">
                    <strong>Your Session Data</strong><br><br>
                    • User-submitted jokes are saved automatically<br>
                    • All ratings you give are saved in this browser<br><br>
                    Use the buttons below to backup or restore your data.
                </p>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button id="saveSessionBtn" class="session-btn">💾 Save Session</button>
                <button id="loadSessionBtn" class="session-btn">📂 Load Session</button>
            </div>

            <input type="file" id="importFile" accept=".json" style="display:none;">
        </div>
    </div>

    <script>
        // Show current date
        function updateDateTime() {
            const dateEl = document.getElementById('currentDate');
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            dateEl.textContent = now.toLocaleDateString('en-US', options);
        }
        updateDateTime();

        // Data storage
        let userJokes = JSON.parse(localStorage.getItem('userJokes')) || [];

        const dadJokes = [
            { setup: "Why don't eggs tell jokes?", delivery: "They'd crack each other up." },
            { setup: "Why did the scarecrow win an award?", delivery: "Because he was outstanding in his field." },
            { setup: "I'm reading a book about anti-gravity.", delivery: "It's impossible to put down." },
            { setup: "Why don't skeletons fight each other?", delivery: "They don't have the guts." },
            { setup: "What do you call cheese that isn't yours?", delivery: "Nacho cheese." },
            { setup: "Why couldn't the bicycle stand up by itself?", delivery: "It was two tired." }
        ];

        const jokeDisplay = document.getElementById('jokeDisplay');

        function getJokeId(data) {
            if (data.id) return `api-${data.id}`;
            return `custom-${btoa((data.setup || data.joke || "")).slice(0,30)}`;
        }

        function saveRating(jokeId, rating, category) {
            let ratings = JSON.parse(localStorage.getItem('jokeRatings') || '{}');
            ratings[jokeId] = { rating: parseInt(rating), category, timestamp: Date.now() };
            localStorage.setItem('jokeRatings', JSON.stringify(ratings));
        }

        // Save Session
        function saveSession() {
            const data = {
                userJokes: userJokes,
                jokeRatings: JSON.parse(localStorage.getItem('jokeRatings') || '{}'),
                savedAt: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `joke-session-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert("✅ Session saved!\n\nKeep this file safe to restore later.");
        }

        // Load Session
        function loadSession(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.userJokes) {
                        userJokes = imported.userJokes;
                        localStorage.setItem('userJokes', JSON.stringify(userJokes));
                    }
                    if (imported.jokeRatings) {
                        localStorage.setItem('jokeRatings', JSON.stringify(imported.jokeRatings));
                    }
                    alert("✅ Session loaded successfully!");
                    document.getElementById('analyticsModal').style.display = 'none';
                } catch (err) {
                    alert("❌ Could not load the file. Please select a valid session backup.");
                }
            };
            reader.readAsText(file);
        }

        // Get Joke
        async function getJoke() {
            const category = document.getElementById('category').value;
            jokeDisplay.innerHTML = `<div style="text-align:center;padding:70px;">Loading joke...</div>`;

            try {
                if (category === "Dad") {
                    const joke = dadJokes[Math.floor(Math.random() * dadJokes.length)];
                    displayJoke({ category: "Dad", setup: joke.setup, delivery: joke.delivery });
                } else if (category === "User") {
                    if (userJokes.length === 0) throw new Error("No user jokes yet.");
                    const joke = userJokes[Math.floor(Math.random() * userJokes.length)];
                    displayJoke({ category: "User Submitted", setup: joke.setup, delivery: joke.delivery });
                } else {
                    const res = await fetch(`${API_BASE}/${category}?safe-mode=true`);
                    const data = await res.json();
                    displayJoke(data);
                }
            } catch (e) {
                jokeDisplay.innerHTML = `<div style="text-align:center;padding:50px;">${e.message}</div>`;
            }
        }

        function displayJoke(data) {
            const categoryName = data.category || "General";
            const jokeId = getJokeId(data);

            let html = `
                <div class="joke-category">📂 ${categoryName}</div>
                <div class="joke-text">${data.setup || data.joke}</div>
            `;
            if (data.delivery) html += `<div class="joke-punchline">😂 ${data.delivery}</div>`;

            html += `
                <div class="rating-container">
                    <div class="rating-stars" data-joke-id="${jokeId}" data-category="${categoryName}">
                        <span data-value="1">★</span>
                        <span data-value="2">★</span>
                        <span data-value="3">★</span>
                        <span data-value="4">★</span>
                        <span data-value="5">★</span>
                    </div>
                    <p style="margin-top:12px; opacity:0.85;">Tap stars to rate</p>
                </div>
            `;

            jokeDisplay.innerHTML = html;

            // Star rating logic
            const stars = document.querySelectorAll(`[data-joke-id="${jokeId}"] span`);
            stars.forEach(star => {
                star.addEventListener('click', () => {
                    const value = star.getAttribute('data-value');
                    saveRating(jokeId, value, categoryName);
                    stars.forEach((s, i) => s.classList.toggle('active', i < value));
                    alert(`Rated ${value}/5 ⭐`);
                });
            });
        }

        // Button Listeners
        document.getElementById('getJoke').addEventListener('click', getJoke);
        document.getElementById('randomBtn').addEventListener('click', () => {
            const cats = ['Any','General','Dad','Programming','Pun','Spooky','User'];
            document.getElementById('category').value = cats[Math.floor(Math.random()*cats.length)];
            getJoke();
        });

        document.getElementById('submitBtn').addEventListener('click', () => document.getElementById('submitModal').style.display = 'flex');
        document.getElementById('cancelSubmit').addEventListener('click', () => document.getElementById('submitModal').style.display = 'none');
        document.getElementById('saveJoke').addEventListener('click', () => {
            const setup = document.getElementById('setupInput').value.trim();
            if (!setup) return alert("Please enter a setup line");
            userJokes.push({ setup, delivery: document.getElementById('punchlineInput').value.trim() });
            localStorage.setItem('userJokes', JSON.stringify(userJokes));
            alert("Joke saved!");
            document.getElementById('submitModal').style.display = 'none';
        });

        document.getElementById('laughterBtn').addEventListener('click', () => document.getElementById('laughterModal').style.display = 'flex');
        document.getElementById('closeLaughter').addEventListener('click', () => document.getElementById('laughterModal').style.display = 'none');

        document.getElementById('analyticsBtn').addEventListener('click', () => document.getElementById('analyticsModal').style.display = 'flex');
        document.getElementById('closeAnalytics').addEventListener('click', () => document.getElementById('analyticsModal').style.display = 'none');

        // Save / Load
        document.getElementById('saveSessionBtn').addEventListener('click', saveSession);
        document.getElementById('loadSessionBtn').addEventListener('click', () => document.getElementById('importFile').click());
        document.getElementById('importFile').addEventListener('change', (e) => {
            if (e.target.files[0]) loadSession(e.target.files[0]);
        });
    </script>
</body>
</html>
