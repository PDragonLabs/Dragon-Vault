<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .controls {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #getJoke {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        #getJoke:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        #getJoke:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #randomBtn {
            background: #17a2b8;
            color: white;
            min-width: 150px;
        }
        #randomBtn:hover {
            background: #138496;
            transform: translateY(-2px);
        }
        .joke-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .joke-category {
            font-size: 0.9em;
            opacity: 0.85;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .joke-text {
            font-size: 1.3em;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .joke-punchline {
            font-size: 1.2em;
            font-weight: bold;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            margin-top: 15px;
        }
        .joke-type {
            font-size: 0.85em;
            opacity: 0.8;
            margin-top: 10px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading {
            text-align: center;
            color: #667eea;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #721c24;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.5em; }
            .joke-text { font-size: 1.1em; }
            .button-group { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎭 Joke Generator</h1>
        <p class="subtitle">Get random or selective jokes from 8+ categories!</p>
        
        <div class="controls">
            <div class="control-group">
                <label for="category">🎯 Choose Category:</label>
                <select id="category">
                    <option value="Any">Any (Mixed)</option>
                    <option value="General">General</option>
                    <option value="Knock-Knock">Knock-Knock</option>
                    <option value="Programming">Programming</option>
                    <option value="Dark">Dark</option>
                    <option value="Spooky">Spooky</option>
                    <option value="Pun">Pun</option>
                    <option value="Miscellaneous">Miscellaneous</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="jokeType">🎪 Joke Type:</label>
                <select id="jokeType">
                    <option value="any">Both</option>
                    <option value="single">Single-liner</option>
                    <option value="twopart">Two-part</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="safeMode">🛡️ Safe Mode:</label>
                <select id="safeMode">
                    <option value="true">On (Safe)</option>
                    <option value="false">Off (All jokes)</option>
                </select>
            </div>
            
            <div class="button-group">
                <button id="getJoke">Get Joke</button>
                <button id="randomBtn">🎲 Random!</button>
            </div>
        </div>
        
        <div id="errorContainer"></div>
        <div class="joke-display" id="jokeDisplay">
            <div class="loading">Click a button to get started!</div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://v2.jokeapi.dev/joke';
        const jokeDisplay = document.getElementById('jokeDisplay');
        const errorContainer = document.getElementById('errorContainer');
        const categorySelect = document.getElementById('category');
        const jokeTypeSelect = document.getElementById('jokeType');
        const safeModeSelect = document.getElementById('safeMode');
        
        document.getElementById('getJoke').addEventListener('click', fetchJoke);
        document.getElementById('randomBtn').addEventListener('click', fetchRandomJoke);
        
        async function fetchJoke() {
            const category = categorySelect.value;
            const type = jokeTypeSelect.value;
            const safe = safeModeSelect.value;
            
            await getJoke(category, type, safe);
        }
        
        async function fetchRandomJoke() {
            const categories = ['General', 'Knock-Knock', 'Programming', 'Dark', 'Spooky', 'Pun', 'Miscellaneous'];
            const types = ['any', 'single', 'twopart'];
            const safeModes = ['true', 'false'];
            
            const randomCategory = categories[Math.floor(Math.random() * categories.length)];
            const randomType = types[Math.floor(Math.random() * types.length)];
            const randomSafe = safeModes[Math.floor(Math.random() * safeModes.length)];
            
            await getJoke(randomCategory, randomType, randomSafe);
        }
        
        async function getJoke(category, type, safe) {
            document.getElementById('getJoke').disabled = true;
            document.getElementById('randomBtn').disabled = true;
            errorContainer.innerHTML = '';
            
            jokeDisplay.innerHTML = `
                <div class="spinner"></div>
                <div class="loading">Loading a joke...</div>
            `;
            
            try {
                let url = `${API_BASE}/${category}`;
                const params = [];
                if (type !== 'any') params.push(`type=${type}`);
                params.push(`safe-mode=${safe}`);
                if (params.length) url += '?' + params.join('&');
                
                const response = await fetch(url);
                
                if (!response.ok) throw new Error('Failed to fetch joke');
                
                const data = await response.json();
                
                if (data.error) throw new Error('No joke found for these filters');
                
                displayJoke(data);
            } catch (error) {
                showError(error.message);
            } finally {
                document.getElementById('getJoke').disabled = false;
                document.getElementById('randomBtn').disabled = false;
            }
        }
        
        function displayJoke(data) {
            let html = `
                <div class="joke-category">📂 ${data.category}</div>
                <div class="joke-text">${data.setup || data.joke}</div>
            `;
            
            if (data.delivery) {
                html += `<div class="joke-punchline">😂 ${data.delivery}</div>`;
            }
            
            html += `<div class="joke-type">${data.type === 'single' ? '📌 Single-liner' : '🎭 Two-part'}</div>`;
            
            jokeDisplay.innerHTML = html;
            jokeDisplay.style.animation = 'none';
            setTimeout(() => jokeDisplay.style.animation = 'slideIn 0.4s ease-out', 10);
        }
        
        function showError(message) {
            errorContainer.innerHTML = `<div class="error">⚠️ ${message}</div>`;
            jokeDisplay.innerHTML = `<div class="loading">Try different filters</div>`;
        }
        
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                fetchJoke();
            }
        });
    </script>
</body>
</html>
