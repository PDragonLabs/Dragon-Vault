<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        button { padding: 10px 20px; font-size: 18px; }
        .joke { margin-top: 20px; font-size: 24px; }
    </style>
</head>
<body>
    <h1>Random Joke Generator</h1>
    <button id="get-joke">Get a Joke</button>
    <div class="joke" id="joke"></div>

    <script>
        document.getElementById('get-joke').addEventListener('click', function() {
            fetch('https://v2.jokeapi.dev/joke/Any')
                .then(response => response.json())
                .then(data => {
                    const jokeElement = document.getElementById('joke');
                    if (data.type === 'single') {
                        jokeElement.textContent = data.joke;
                    } else {
                        jokeElement.textContent = `${data.setup} - ${data.delivery}`;
                    }
                })
                .catch(error => {
                    console.error('Error fetching joke:', error);
                });
        });
    </script>
</body>
</html>
