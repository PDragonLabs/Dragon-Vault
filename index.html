
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDragonLabs Vault</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family: 'Arial', sans-serif; color:#ff4400; }
    canvas { position:absolute; top:0; left:0; }
    .overlay {
      position:absolute; top:0; left:0; width:100%; height:100%; z-index:10;
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      text-align:center; pointer-events:none;
    }
    .content { pointer-events:auto; max-width:800px; padding:20px; }
    h1 { font-size:4.2rem; margin:0; text-shadow:0 0 40px #ff4400; letter-spacing:6px; }
    .subtitle { font-size:1.6rem; margin:10px 0 30px; color:#ffaa00; text-shadow:0 0 25px #ffaa00; }
    .teaser { width:100%; max-width:640px; margin:20px 0; border:4px solid #ff4400; box-shadow:0 0 50px #ff4400; }
    .unlock-btn {
      background:#000; color:#ff4400; border:5px solid #ff4400; padding:22px 70px;
      font-size:2.1rem; font-weight:bold; cursor:pointer; margin-top:30px;
      box-shadow:0 0 60px #ff4400; transition:all 0.4s; text-transform:uppercase;
    }
    .unlock-btn:hover { background:#ff4400; color:#000; box-shadow:0 0 90px #ffaa00; transform:scale(1.08); }
    .want-ad { font-style:italic; font-size:1.25rem; max-width:620px; margin:25px; line-height:1.4; }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="overlay">
    <div class="content">
      <h1>PDRAGON VAULT</h1>
      <p class="subtitle">Dallas/Fort Worth (DFW) • J.KAST.CADE aka PDragonLabs • 30 seconds for the curious</p>
      
      <!-- YOUR REAL TEASER TRACK -->
      <iframe class="teaser" width="100%" height="166" scrolling="no" frameborder="no"
        src="https://w.soundcloud.com/player/?url=https://soundcloud.com/pai-dj/teaser-f&color=%23ff4400&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true">
      </iframe>

      <p class="want-ad">
        WANTED: Warriors who can handle the full uncut dragon flame.<br>
        Casual listeners stay in the teaser. Real supporters unlock the beast below.
      </p>

      <!-- YOUR REAL KO-FI SHOP -->
      <button class="unlock-btn" onclick="window.open('https://ko-fi.com/s/e531145ecf', '_blank')">
        ENTER THE DEN • UNLOCK FULL TRACK
      </button>

      <p style="margin-top:50px; font-size:0.95rem; opacity:0.7;">
        No greed. No envy. Just fire. • Powered by PDragonLabs
      </p>
    </div>
  </div>

  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('bg'), antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    camera.position.z = 5;

    // Glowing Dragon Orb
    const orb = new THREE.Mesh(
      new THREE.IcosahedronGeometry(1.25, 1),
      new THREE.MeshBasicMaterial({color: 0xff4400, wireframe: true})
    );
    scene.add(orb);

    // Fire Particles
    const particleCount = 900;
    const particles = new THREE.BufferGeometry();
    const pos = new Float32Array(particleCount * 3);
    const col = new Float32Array(particleCount * 3);
    const siz = new Float32Array(particleCount);

    for(let i = 0; i < particleCount * 3; i += 3) {
      pos[i] = (Math.random()-0.5)*9; pos[i+1]=(Math.random()-0.5)*9; pos[i+2]=(Math.random()-0.5)*9;
      col[i]=1; col[i+1]=Math.random()*0.7+0.3; col[i+2]=0;
      siz[i/3]=Math.random()*0.18+0.06;
    }
    particles.setAttribute('position', new THREE.BufferAttribute(pos,3));
    particles.setAttribute('color', new THREE.BufferAttribute(col,3));
    particles.setAttribute('size', new THREE.BufferAttribute(siz,1));

    const pSystem = new THREE.Points(particles, 
      new THREE.PointsMaterial({size:0.09, vertexColors:true, transparent:true, blending:THREE.AdditiveBlending})
    );
    scene.add(pSystem);

    function animate() {
      requestAnimationFrame(animate);
      orb.rotation.y += 0.003;
      pSystem.rotation.y += 0.0006;
      orb.scale.setScalar(1 + Math.sin(Date.now()*0.0035)*0.07);
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
