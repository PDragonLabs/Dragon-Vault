<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joke Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 720px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 { color: #333; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }

        .controls { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; color: #333; margin-bottom: 8px; }
        select, button {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }
        select:focus { outline: none; border-color: #667eea; }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        #getJoke { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        #randomBtn { background: #17a2b8; color: white; }
        #submitBtn { background: #28a745; color: white; }
        #laughterBtn { background: #ff9800; color: white; }
        #analyticsBtn { background: #6f42c1; color: white; }

        .joke-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            min-height: 180px;
            margin-bottom: 20px;
        }
        .joke-category { font-size: 0.95em; opacity: 0.9; margin-bottom: 10px; text-transform: uppercase; }
        .joke-text { font-size: 1.35em; line-height: 1.5; margin-bottom: 15px; }
        .joke-punchline { font-size: 1.25em; font-weight: bold; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.3); }

        .rating-container { margin-top: 25px; text-align: center; }
        .mood-buttons { display: flex; justify-content: center; gap: 15px; font-size: 2em; margin-bottom: 12px; }
        .mood-buttons span { cursor: pointer; transition: transform 0.2s; }
        .mood-buttons span:hover { transform: scale(1.3); }
        .rating-stars { font-size: 2.2em; cursor: pointer; }
        .rating-stars span { color: #ddd; transition: color 0.2s; }
        .rating-stars span.active, .rating-stars span:hover { color: #ffd700; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 650px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .tab-btn { padding: 10px 18px; border-radius: 8px; margin-right: 8px; background: #f0f0f0; border: none; cursor: pointer; }
        .tab-btn.active { background: #667eea; color: white; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎭 Joke Generator</h1>
        <p class="subtitle">Get random jokes + track your humor & mood</p>

        <div class="controls">
            <div class="control-group">
                <label for="category">🎯 Category:</label>
                <select id="category">
                    <option value="Any">Any (Mixed)</option>
                    <option value="General">General</option>
                    <option value="Dad">Dad Jokes</option>
                    <option value="Programming">Programming</option>
                    <option value="Pun">Pun</option>
                    <option value="Spooky">Spooky</option>
                    <option value="Dark">Dark</option>
                    <option value="Miscellaneous">Miscellaneous</option>
                    <option value="User">User Submitted</option>
                </select>
            </div>

            <div class="button-group">
                <button id="getJoke">Get Joke</button>
                <button id="randomBtn">🎲 Random!</button>
            </div>

            <div class="button-group" style="margin-top: 12px;">
                <button id="submitBtn">📝 Submit Joke</button>
                <button id="laughterBtn">😂 Laughter Boost</button>
                <button id="analyticsBtn">📊 Analytics</button>
            </div>
        </div>

        <div id="errorContainer"></div>
        <div class="joke-display" id="jokeDisplay">
            <div style="text-align:center; padding:40px 20px; color:rgba(255,255,255,0.9);">
                Click a button to get started!
            </div>
        </div>
    </div>

    <!-- Submit Modal -->
    <div id="submitModal" class="modal">
        <div class="modal-content">
            <h2>Submit Your Own Joke</h2>
            <select id="submitType" style="margin:15px 0; width:100%; padding:10px;">
                <option value="twopart">Two-part Joke</option>
                <option value="single">Single-liner</option>
            </select>
            <input type="text" id="setupInput" placeholder="Setup line..." style="width:100%; padding:12px; margin-bottom:10px;">
            <input type="text" id="punchlineInput" placeholder="Punchline..." style="width:100%; padding:12px; margin-bottom:20px;">
            <div style="display:flex; gap:10px;">
                <button id="cancelSubmit" style="flex:1; padding:12px; background:#ddd;">Cancel</button>
                <button id="saveJoke" style="flex:1; padding:12px; background:#667eea; color:white;">Submit Joke</button>
            </div>
        </div>
    </div>

    <!-- Laughter Yoga Modal -->
    <div id="laughterModal" class="modal">
        <div class="modal-content">
            <h2>😂 Morning Laughter Yoga (10 min)</h2>
            <div id="laughterContent" style="line-height:1.8; font-size:1.05em;">
                <!-- Filled by JS -->
            </div>
            <button id="closeLaughter" style="margin-top:20px; padding:12px; width:100%; background:#ff9800; color:white; border:none; border-radius:10px;">Done — Feeling Better?</button>
        </div>
    </div>

    <!-- Analytics Modal -->
    <div id="analyticsModal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2>📊 Your Humor Analytics</h2>
                <button id="closeAnalytics" style="font-size:1.8em; background:none; border:none;">×</button>
            </div>
            <div style="margin-bottom:15px;">
                <button id="overviewTab" class="tab-btn active">Overview</button>
                <button id="trendsTab" class="tab-btn">Trends</button>
                <button id="catTrendsTab" class="tab-btn">Category Trends</button>
                <button id="moodTab" class="tab-btn">Mood Correlation</button>
            </div>
            <div id="analyticsContent"></div>
            <div id="trendsContent" style="display:none;"><canvas id="ratingTrendChart" height="300"></canvas></div>
            <div id="catTrendsContent" style="display:none;"><canvas id="categoryTrendChart" height="340"></canvas></div>
            <div id="moodContent" style="display:none;"><canvas id="moodCorrelationChart" height="340"></canvas></div>
        </div>
    </div>

    <script>
        // ================== DATA ==================
        const API_BASE = 'https://v2.jokeapi.dev/joke';
        let userJokes = JSON.parse(localStorage.getItem('userJokes')) || [];
        let dadJokes = [
            { setup: "Why don't eggs tell jokes?", delivery: "They'd crack each other up." },
            { setup: "Why did the scarecrow win an award?", delivery: "Because he was outstanding in his field." },
            { setup: "I'm reading a book about anti-gravity.", delivery: "It's impossible to put down." },
            { setup: "Why don't skeletons fight each other?", delivery: "They don't have the guts." },
            { setup: "What do you call cheese that isn't yours?", delivery: "Nacho cheese." },
            { setup: "Why couldn't the bicycle stand up by itself?", delivery: "It was two tired." },
            { setup: "Why do seagulls fly over the ocean?", delivery: "Because if they flew over the bay, we'd call them bagels." },
            { setup: "What do you call fake spaghetti?", delivery: "An impasta." }
        ];

        // DOM elements
        const jokeDisplay = document.getElementById('jokeDisplay');
        const errorContainer = document.getElementById('errorContainer');

        // ================== HELPERS ==================
        function getJokeId(data) {
            if (data.id) return `api-${data.id}`;
            if (data.setup) return `custom-${btoa(data.setup.substring(0,80)).slice(0,25)}`;
            return `joke-${Date.now()}`;
        }

        function saveRating(jokeId, rating, category, mood = 3) {
            let ratings = JSON.parse(localStorage.getItem('jokeRatings') || '{}');
            ratings[jokeId] = { rating: parseInt(rating), category, mood: parseInt(mood), timestamp: Date.now() };
            localStorage.setItem('jokeRatings', JSON.stringify(ratings));
        }

        // ================== MAIN JOKE FETCH ==================
        async function getJoke() {
            const category = document.getElementById('category').value;
            document.getElementById('getJoke').disabled = true;
            document.getElementById('randomBtn').disabled = true;

            jokeDisplay.innerHTML = `<div style="text-align:center;padding:50px;"><div style="width:50px;height:50px;border:5px solid #fff;border-top-color:transparent;border-radius:50%;margin:0 auto 15px;animation:spin 1s linear infinite;"></div>Loading...</div>`;

            try {
                if (category === "Dad") {
                    const joke = dadJokes[Math.floor(Math.random() * dadJokes.length)];
                    displayJoke({ category: "Dad", setup: joke.setup, delivery: joke.delivery, type: "twopart" });
                } else if (category === "User") {
                    if (userJokes.length === 0) throw new Error("No user jokes yet! Submit one first.");
                    const joke = userJokes[Math.floor(Math.random() * userJokes.length)];
                    displayJoke({ category: "User Submitted", setup: joke.setup, delivery: joke.delivery, type: joke.type });
                } else {
                    let url = `${API_BASE}/${category}`;
                    const params = [`safe-mode=true`];
                    url += '?' + params.join('&');

                    const res = await fetch(url);
                    const data = await res.json();
                    if (data.error) throw new Error("No joke found.");
                    displayJoke(data);
                }
            } catch (e) {
                errorContainer.innerHTML = `<div style="background:#f8d7da;color:#721c24;padding:15px;border-radius:8px;">${e.message}</div>`;
                jokeDisplay.innerHTML = `<div style="text-align:center;padding:40px;">Try another category</div>`;
            } finally {
                document.getElementById('getJoke').disabled = false;
                document.getElementById('randomBtn').disabled = false;
            }
        }

        function displayJoke(data) {
            const categoryName = data.category || "General";
            const jokeId = getJokeId(data);

            let html = `
                <div class="joke-category">📂 ${categoryName}</div>
                <div class="joke-text">${data.setup || data.joke}</div>
            `;
            if (data.delivery) html += `<div class="joke-punchline">😂 ${data.delivery}</div>`;

            html += `
                <div class="rating-container">
                    <div class="mood-buttons" id="mood-${jokeId}">
                        <span data-mood="5">😄</span><span data-mood="4">🙂</span><span data-mood="3">😐</span><span data-mood="2">😕</span><span data-mood="1">😞</span>
                    </div>
                    <div class="rating-stars" data-joke-id="${jokeId}" data-category="${categoryName}">
                        <span data-value="1">★</span><span data-value="2">★</span><span data-value="3">★</span><span data-value="4">★</span><span data-value="5">★</span>
                    </div>
                </div>
            `;

            jokeDisplay.innerHTML = html;
            attachListeners(jokeId, categoryName);
        }

        function attachListeners(jokeId, category) {
            // Mood + Rating logic (simplified)
            const stars = document.querySelectorAll(`[data-joke-id="${jokeId}"] span`);
            stars.forEach(star => {
                star.addEventListener('click', () => {
                    const value = star.getAttribute('data-value');
                    const moodEl = document.getElementById(`mood-${jokeId}`);
                    const selectedMood = moodEl ? moodEl.querySelector('span[style*="opacity:1"]') || {dataset:{mood:3}} : {dataset:{mood:3}};
                    saveRating(jokeId, value, category, selectedMood.dataset.mood || 3);
                    alert(`Rated ${value}/5 ⭐`);
                });
            });
        }

        // ================== BUTTONS ==================
        document.getElementById('getJoke').addEventListener('click', getJoke);
        document.getElementById('randomBtn').addEventListener('click', () => {
            const categories = ['General','Dad','Programming','Pun','Spooky','Miscellaneous','User'];
            document.getElementById('category').value = categories[Math.floor(Math.random()*categories.length)];
            getJoke();
        });

        // Submit joke
        document.getElementById('submitBtn').addEventListener('click', () => {
            document.getElementById('submitModal').style.display = 'flex';
        });
        document.getElementById('cancelSubmit').addEventListener('click', () => document.getElementById('submitModal').style.display = 'none');
        document.getElementById('saveJoke').addEventListener('click', () => {
            const setup = document.getElementById('setupInput').value.trim();
            if (!setup) return alert("Enter a setup!");
            userJokes.push({ setup, delivery: document.getElementById('punchlineInput').value.trim(), type: "twopart" });
            localStorage.setItem('userJokes', JSON.stringify(userJokes));
            alert("Joke saved! Check 'User Submitted' category.");
            document.getElementById('submitModal').style.display = 'none';
            document.getElementById('setupInput').value = '';
            document.getElementById('punchlineInput').value = '';
        });

        // Laughter Yoga
        document.getElementById('laughterBtn').addEventListener('click', () => {
            const content = document.getElementById('laughterContent');
            content.innerHTML = `
                <h3>10-Minute Morning Routine</h3>
                <ol style="margin:20px 0; padding-left:20px;">
                    <li><strong>Warm-up:</strong> Clap + "Ho ho ha ha ha" for 1 minute</li>
                    <li><strong>One Meter Laugh:</strong> Slide hand across arm → big laugh (3x each side)</li>
                    <li><strong>Lion Laugh:</strong> Tongue out, roar, then laugh (5x)</li>
                    <li><strong>Aloha Laugh:</strong> Arms up + "Aloooo..." then laugh (4x)</li>
                    <li><strong>Free Laughter:</strong> Laugh however you want for 2 minutes</li>
                    <li><strong>Close:</strong> Deep breaths + "I am happy, I am healthy"</li>
                </ol>
                <p><strong>Pro tip:</strong> Fake it until it becomes real. It usually does within 30 seconds.</p>
            `;
            document.getElementById('laughterModal').style.display = 'flex';
        });
        document.getElementById('closeLaughter').addEventListener('click', () => {
            document.getElementById('laughterModal').style.display = 'none';
        });

        // Analytics (simplified version)
        document.getElementById('analyticsBtn').addEventListener('click', () => {
            document.getElementById('analyticsModal').style.display = 'flex';
            document.getElementById('analyticsContent').innerHTML = `
                <p style="text-align:center; padding:60px 20px; color:#666;">
                    You've rated jokes with this tool.<br><br>
                    <strong>Keep using it</strong> — your personal humor + mood patterns will appear here as you rate more jokes.
                </p>
            `;
        });
        document.getElementById('closeAnalytics').addEventListener('click', () => document.getElementById('analyticsModal').style.display = 'none');

        // Keyboard support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') getJoke();
        });

        // Initial message
        console.log("%cJoke Generator with Mood & Laughter Yoga ready! 🎉", "color:#667eea; font-size:14px;");
    </script>
</body>
</html>
